<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{BRAND_NAME}} Regex-Tester</title>
<meta name="referrer" content="no-referrer">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f141c" media="(prefers-color-scheme: dark)">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="icon" href="../favicon-48.png" type="image/png" sizes="48x48">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">
<style>
:root{
  --bg:#f6f7f9; --card:#ffffff; --text:#1a2233; --muted:#5c6675;
  --accent:{{ACCENT}}; --accent-soft:{{ACCENT_SOFT}}; --border:#e3e7ee; --over:#dc2626;
  --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.1);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f141c; --card:#171e29; --text:#e8ecf3; --muted:#98a2b3;
    --accent:{{ACCENT_DARK}}; --accent-soft:{{ACCENT_SOFT_DARK}}; --border:#26303f; --over:#f87171;
    --shadow:0 1px 2px rgba(0,0,0,.4);
  }
}
*{box-sizing:border-box}
/* The UA rule for [hidden] is display:none at the lowest possible specificity,
   so any class rule that sets display silently defeats it and the element stays
   on screen. Anything hidden must actually be hidden. */
[hidden]{display:none!important}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--bg); color:var(--text);
  font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
.wrap{max-width:1080px;margin:0 auto;padding:0 16px}
a{color:var(--accent)}
header{position:relative;padding:36px 0 8px;text-align:center}
h1{font-size:2rem;margin:24px 0 12px;letter-spacing:-.02em}
.tagline{color:var(--muted);margin:0 auto;max-width:46rem}
.badge{
  display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:6px 12px;
  border:1px solid var(--accent);border-radius:999px;font-size:0.9rem;font-weight:600;
  color:var(--accent);background:var(--accent-soft)
}
.repo-link{display:block;margin-top:10px;font-size:.82rem;color:var(--muted);text-decoration:none}
.repo-link:hover{color:var(--accent);text-decoration:underline}
.repo-link svg{vertical-align:-2px;margin-right:5px}
nav.toc{margin:14px 0 0;font-size:.85rem;text-align:center}
nav.toc a{margin:0 8px;white-space:nowrap;text-decoration:none}
nav.toc a:hover{text-decoration:underline}
main{padding-bottom:24px}
section{margin:34px auto}
.prose{max-width:46rem}
h2{font-size:1.35rem;margin:0 0 10px;letter-spacing:-.01em}
h3{font-size:1.05rem;margin:22px 0 6px}
p{margin:0 0 12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow)}
.muted{color:var(--muted)}
.cross-link{text-align:center;margin:24px auto 0;font-size:.95rem;color:var(--muted)}
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
footer{border-top:1px solid var(--border);padding:22px 0 34px;text-align:center;font-size:.85rem;color:var(--muted)}
.lang{position:relative;display:inline-block;margin:0 0 14px;text-align:left;font-size:.85rem}
.lang summary{list-style:none;display:inline-block;cursor:pointer;padding:5px 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--muted);user-select:none}
.lang summary::-webkit-details-marker{display:none}
.lang summary:hover,.lang[open] summary{color:var(--accent);border-color:var(--accent)}
.lang ul{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);margin:0 0 6px;padding:6px;list-style:none;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);min-width:9em;z-index:10}
.lang li a,.lang li[aria-current]{display:block;padding:6px 10px;border-radius:6px;text-decoration:none;white-space:nowrap}
.lang li[aria-current]{color:var(--muted);font-weight:600}
.lang li a:hover{background:var(--accent-soft)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
:root{
  --hl:#fde68a; --hl2:#fbbf24; --ok:#15803d;
}
@media (prefers-color-scheme: dark){
  :root{
    --hl:#78500a; --hl2:#a16207; --ok:#4ade80;
  }
}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.pane{padding:16px 18px}
.pane h2{font-size:1.02rem;margin:0 0 12px}

.pattern{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:8px;background:var(--card);padding:0 10px}
.pattern:focus-within{outline:2px solid var(--accent);outline-offset:2px}
.pattern .slash{color:var(--muted);font:600 1.05rem/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;padding:0 4px;user-select:none}
.pattern input{
  flex:1;min-width:0;border:0;background:transparent;color:var(--text);
  font:600 1rem/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;padding:10px 4px
}
.pattern input:focus-visible{outline:none}
.pattern .flags-read{color:var(--accent);font:600 .95rem/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;padding:0 2px;min-width:1ch}

.flags{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0 0}
.flag{position:relative}
.flag input{position:absolute;opacity:0;width:0;height:0}
.flag span{
  display:inline-block;padding:5px 10px;border:1px solid var(--border);border-radius:7px;
  background:var(--card);color:var(--muted);cursor:pointer;font-size:.82rem;user-select:none
}
.flag span b{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--text)}
.flag input:checked+span{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.flag input:checked+span b{color:var(--accent)}
.flag input:focus-visible+span{outline:2px solid var(--accent);outline-offset:2px}

.editor{position:relative;margin-top:12px}
.backdrop,#test{
  font:.92rem/1.6 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  padding:12px;border:1px solid var(--border);border-radius:8px;width:100%;
  white-space:pre-wrap;overflow-wrap:break-word;word-break:break-word;margin:0
}
.backdrop{position:absolute;inset:0;overflow:hidden;color:transparent;background:var(--card)}
.backdrop mark{background:var(--hl);color:transparent;border-radius:2px}
.backdrop mark.alt{background:var(--hl2)}
.backdrop mark.empty{outline:2px solid var(--hl2);outline-offset:-1px}
#test{position:relative;display:block;min-height:190px;background:transparent;color:var(--text);resize:vertical;overflow:auto}

.status{display:flex;flex-wrap:wrap;align-items:center;gap:8px 14px;margin:12px 0 0;font-size:.88rem}
.count{font-weight:600;color:var(--ok)}
.count.none{color:var(--muted)}
.err{color:var(--over);font-size:.88rem;overflow-wrap:anywhere}
.status .spacer{flex:1}
button.mini{
  font:inherit;font-size:.8rem;padding:5px 11px;border-radius:7px;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:var(--text)
}
button.mini:hover{border-color:var(--accent);color:var(--accent)}

.matches{margin:0;padding:0;list-style:none;display:grid;gap:8px;max-height:340px;overflow-y:auto}
.matches li{border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:.86rem}
.matches .head{display:flex;flex-wrap:wrap;gap:4px 10px;align-items:baseline}
.matches .n{font-weight:700;color:var(--accent)}
.matches .at{color:var(--muted);font-size:.78rem}
.matches .txt{
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:var(--hl);
  color:var(--text);border-radius:3px;padding:0 3px;overflow-wrap:anywhere
}
.matches .grp{display:grid;grid-template-columns:auto 1fr;gap:3px 10px;margin:7px 0 0;font-size:.8rem}
.matches .gk{color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:nowrap}
.matches .gv{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;overflow-wrap:anywhere}
.matches .gv.undef{color:var(--muted);font-style:italic}
.empty-note{color:var(--muted);font-size:.88rem;margin:0}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
@media (max-width:900px){.grid{grid-template-columns:1fr}}

.rep input{
  width:100%;font:.92rem/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  padding:9px 11px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text)
}
.rep pre{
  margin:10px 0 0;padding:12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);
  font:.88rem/1.6 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:pre-wrap;
  overflow-wrap:break-word;max-height:180px;overflow:auto
}

.samples{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0 0}
.samples button{
  font:inherit;font-size:.8rem;padding:5px 11px;border-radius:999px;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:var(--muted)
}
.samples button:hover{border-color:var(--accent);color:var(--accent)}

.props{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media (max-width:760px){.props{grid-template-columns:1fr}}
.props div{padding:16px}
.props strong{display:block;margin-bottom:4px}
.props p{margin:0;font-size:.9rem;color:var(--muted)}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:var(--card);box-shadow:var(--shadow)}
table{border-collapse:collapse;width:100%;font-size:.92rem;min-width:420px}
caption{caption-side:bottom;text-align:left;font-size:.8rem;color:var(--muted);padding:10px 14px}
th,td{text-align:left;padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:top}
tbody tr:last-child td{border-bottom:0}
th{font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
td code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.9em;background:var(--accent-soft);color:var(--accent);padding:1px 5px;border-radius:4px;white-space:nowrap}
.faq p{color:var(--text)}
code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}

/* Mobile: let tables reflow to fit the viewport instead of scrolling.
   min-width would otherwise hold the table open and overflow the page. */
@media (max-width:560px){
  table{min-width:0}
  th,td{padding-left:8px;padding-right:8px}
  td{overflow-wrap:break-word}
  td code{white-space:normal}
  thead th{text-transform:none;letter-spacing:normal}
}
.brand-logo{height:56px;max-width:220px;object-fit:contain;display:block;margin:0 auto}
</style>
</head>
<body>

<header class="wrap">
  {{LOGO}}
  <h1>{{BRAND_NAME}} Regex-Tester</h1>
</header>

<main class="wrap">

<section id="tool" aria-label="Tester für reguläre Ausdrücke">
    <div class="card pane">
      <h2><label for="pattern">Regulärer Ausdruck</label></h2>
      <div class="pattern">
        <span class="slash" aria-hidden="true">/</span>
        <input type="text" id="pattern" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off" placeholder="\d{3}-\d{4}">
        <span class="slash" aria-hidden="true">/</span>
        <span class="flags-read mono" id="flags-read" aria-hidden="true"></span>
      </div>

      <div class="flags" role="group" aria-label="Flags">
        <label class="flag"><input type="checkbox" id="f-g" value="g" checked><span><b>g</b> global</span></label>
        <label class="flag"><input type="checkbox" id="f-i" value="i"><span><b>i</b> Groß/klein egal</span></label>
        <label class="flag"><input type="checkbox" id="f-m" value="m"><span><b>m</b> mehrzeilig</span></label>
        <label class="flag"><input type="checkbox" id="f-s" value="s"><span><b>s</b> dotAll</span></label>
        <label class="flag"><input type="checkbox" id="f-u" value="u"><span><b>u</b> Unicode</span></label>
        <label class="flag"><input type="checkbox" id="f-y" value="y"><span><b>y</b> sticky</span></label>
      </div>

      <div class="samples" aria-label="Beispielmuster">
        <button type="button" data-p="[\w.+-]+@[\w-]+\.[\w.]+" data-f="gi">E-Mail</button>
        <button type="button" data-p="https?://[^\s&quot;&lt;&gt;]+" data-f="g">URL</button>
        <button type="button" data-p="(?&lt;year&gt;\d{4})-(?&lt;month&gt;\d{2})-(?&lt;day&gt;\d{2})" data-f="g">Datum (benannte Gruppen)</button>
        <button type="button" data-p="#(?:[0-9a-f]{3}|[0-9a-f]{6})\b" data-f="gi">Hex-Farbe</button>
        <button type="button" data-p="^\s*$" data-f="gm">Leerzeilen</button>
      </div>

      <p class="err" id="err" aria-live="polite"></p>

      <div class="editor">
        <div class="backdrop mono" id="backdrop" aria-hidden="true"></div>
        <label class="sr-only" for="test">Testtext</label>
        <textarea id="test" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off" placeholder="Füge den Text ein, gegen den du testen willst."></textarea>
      </div>

      <div class="status">
        <span class="count" id="count" aria-live="polite">0 Treffer</span>
        <span class="spacer"></span>
        <button type="button" class="mini" id="clear">Text leeren</button>
      </div>
    </div>

    <div class="grid">
      <div class="card pane">
        <h2 id="matches-heading">Treffer</h2>
        <ul class="matches" id="matches" aria-labelledby="matches-heading"></ul>
        <p class="empty-note" id="matches-empty">Treffer und ihre Capture-Gruppen erscheinen hier.</p>
      </div>

      <div class="card pane rep">
        <h2><label for="replace">Ersetzungsvorschau</label></h2>
        <input type="text" id="replace" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off" placeholder="Nutze $1, $&lt;name&gt;, $&amp; …">
        <pre id="rep-out"></pre>
        <div class="status">
          <span class="spacer"></span>
          <button type="button" class="mini" id="rep-copy">Ergebnis kopieren</button>
        </div>
      </div>
    </div>
  </section>

</main>

<footer>
{{LANG_SWITCH}}
<div class="wrap">{{FOOTER_ATTRIBUTION}}</div>
</footer>

<script>
/* Regex matching + segmentation. Pure functions, returned for testability. */
var RX = (function () {
  'use strict';

  var MAX_MATCHES = 500;

  // Build a RegExp, or report the engine's own syntax error.
  // Returns { re } | { error } - 'empty' signals "nothing typed yet", not a fault.
  function build(pattern, flags) {
    if (!pattern) return { error: 'empty' };
    try {
      return { re: new RegExp(pattern, flags) };
    } catch (e) {
      return { error: e.message };
    }
  }

  function toMatch(m) {
    var named = null;
    if (m.groups) {
      named = {};
      for (var k in m.groups) if (Object.prototype.hasOwnProperty.call(m.groups, k)) named[k] = m.groups[k];
    }
    return {
      index: m.index,
      end: m.index + m[0].length,
      text: m[0],
      groups: Array.prototype.slice.call(m, 1),
      named: named
    };
  }

  // All matches of re in text. Non-global patterns yield at most one, matching
  // what String.match does without /g.
  // Returns { matches, truncated }
  function find(re, text, limit) {
    limit = limit || MAX_MATCHES;
    var out = [], m;
    if (re.global === false) {
      m = re.exec(text);
      if (m) out.push(toMatch(m));
      return { matches: out, truncated: false };
    }
    re.lastIndex = 0;
    while ((m = re.exec(text)) !== null) {
      out.push(toMatch(m));
      // A zero-length match leaves lastIndex where it was; step over it or loop forever.
      if (m[0] === '') re.lastIndex++;
      if (out.length >= limit) return { matches: out, truncated: true };
      // Sticky patterns stop at the first gap; exec returning null ends the loop.
    }
    return { matches: out, truncated: false };
  }

  // Split text into runs tagged with the match they belong to (-1 = no match),
  // so a highlighter can render without doing its own index arithmetic.
  function segments(text, matches) {
    var out = [], pos = 0;
    for (var i = 0; i < matches.length; i++) {
      var m = matches[i];
      if (m.index > pos) out.push({ text: text.slice(pos, m.index), match: -1 });
      out.push({ text: text.slice(m.index, m.end), match: i });
      pos = Math.max(pos, m.end);
    }
    if (pos < text.length) out.push({ text: text.slice(pos), match: -1 });
    return out;
  }

  // Replacement uses the engine's own $1 / $<name> / $& handling.
  function replace(re, text, repl) {
    try {
      if (re.global) re.lastIndex = 0;
      return { text: text.replace(re, repl) };
    } catch (e) {
      return { error: e.message };
    }
  }

  return {
    MAX_MATCHES: MAX_MATCHES,
    build: build, find: find, segments: segments, replace: replace
  };
})();
if (typeof module !== 'undefined') module.exports = RX;

(function () {
  'use strict';
  if (typeof document === 'undefined') return;
  var $ = function (id) { return document.getElementById(id); };
  var I18N = {
    "emptyMatch": "(leerer Treffer)",
    "undefinedVal": "undefiniert",
    "indexLength": "Index {i} · Länge {n}",
    "showingFirst": "Es werden die ersten {n} Treffer angezeigt.",
    "zeroMatches": "0 Treffer",
    "invalidPattern": "Ungültiges Muster",
    "oneMatch": "1 Treffer",
    "nMatches": "{n} Treffer",
    "copied": "Kopiert",
    "seedText": "Kontakt für Zugang: ada@example.com oder grace.hopper@navy.mil.\nEskalationen an on-call+urgent@example.co.uk (rund um die Uhr).\nKeine Adresse: user at example dot com."
  };

  var FLAGS = ['g', 'i', 'm', 's', 'u', 'y'];
  var pattern = $('pattern'), test = $('test'), backdrop = $('backdrop');
  var err = $('err'), count = $('count'), list = $('matches'), listEmpty = $('matches-empty');
  var repIn = $('replace'), repOut = $('rep-out');

  function flags() {
    return FLAGS.filter(function (f) { return $('f-' + f).checked; }).join('');
  }

  function truncate(s, max) {
    return s.length > max ? s.slice(0, max) + '…' : s;
  }

  // Show whitespace-only matches as something visible rather than a blank line.
  function display(s) {
    if (s === '') return I18N.emptyMatch;
    return truncate(s, 120);
  }

  function renderBackdrop(text, matches) {
    backdrop.textContent = '';
    var segs = RX.segments(text, matches);
    for (var i = 0; i < segs.length; i++) {
      var s = segs[i];
      if (s.match === -1) {
        backdrop.appendChild(document.createTextNode(s.text));
      } else {
        var mk = document.createElement('mark');
        // Alternate shades so two adjacent matches stay visually distinct.
        if (s.match % 2) mk.className = 'alt';
        if (s.text === '') mk.className += ' empty';
        mk.textContent = s.text;
        backdrop.appendChild(mk);
      }
    }
    // A trailing newline is not rendered by the backdrop div but is by the
    // textarea; pad it so the two stay aligned when the text ends in one.
    backdrop.appendChild(document.createTextNode('\n'));
  }

  function groupRow(k, v) {
    var kEl = document.createElement('span');
    kEl.className = 'gk'; kEl.textContent = k;
    var vEl = document.createElement('span');
    vEl.className = 'gv';
    if (v === undefined) { vEl.className += ' undef'; vEl.textContent = I18N.undefinedVal; }
    else vEl.textContent = display(v);
    return [kEl, vEl];
  }

  function renderMatches(matches, truncated) {
    list.textContent = '';
    for (var i = 0; i < matches.length; i++) {
      var m = matches[i];
      var li = document.createElement('li');

      var head = document.createElement('div');
      head.className = 'head';
      var n = document.createElement('span');
      n.className = 'n'; n.textContent = '#' + (i + 1);
      var txt = document.createElement('span');
      txt.className = 'txt'; txt.textContent = display(m.text);
      var at = document.createElement('span');
      at.className = 'at';
      at.textContent = I18N.indexLength.replace('{i}', m.index).replace('{n}', m.text.length);
      head.appendChild(n); head.appendChild(txt); head.appendChild(at);
      li.appendChild(head);

      var rows = [];
      for (var g = 0; g < m.groups.length; g++) rows.push(groupRow('$' + (g + 1), m.groups[g]));
      if (m.named) {
        for (var k in m.named) if (Object.prototype.hasOwnProperty.call(m.named, k)) {
          rows.push(groupRow('$<' + k + '>', m.named[k]));
        }
      }
      if (rows.length) {
        var grp = document.createElement('div');
        grp.className = 'grp';
        rows.forEach(function (pair) { grp.appendChild(pair[0]); grp.appendChild(pair[1]); });
        li.appendChild(grp);
      }
      list.appendChild(li);
    }
    if (truncated) {
      var li2 = document.createElement('li');
      li2.className = 'empty-note';
      li2.textContent = I18N.showingFirst.replace('{n}', RX.MAX_MATCHES);
      list.appendChild(li2);
    }
    listEmpty.hidden = matches.length > 0;
  }

  function update() {
    var text = test.value;
    var built = RX.build(pattern.value, flags());
    $('flags-read').textContent = flags();

    if (built.error) {
      // An empty pattern is the start state, not a mistake - say nothing.
      err.textContent = built.error === 'empty' ? '' : built.error;
      backdrop.textContent = text + '\n';
      count.textContent = built.error === 'empty' ? I18N.zeroMatches : I18N.invalidPattern;
      count.className = 'count none';
      renderMatches([], false);
      repOut.textContent = '';
      return;
    }
    err.textContent = '';

    var res = RX.find(built.re, text);
    renderBackdrop(text, res.matches);
    renderMatches(res.matches, res.truncated);

    var n = res.matches.length;
    count.textContent = n === 1 ? I18N.oneMatch : I18N.nMatches.replace('{n}', n + (res.truncated ? '+' : ''));
    count.className = 'count' + (n ? '' : ' none');

    var rep = RX.replace(built.re, text, repIn.value);
    repOut.textContent = rep.error ? '' : rep.text;
    if (rep.error) err.textContent = rep.error;
  }

  // Keep the highlight layer aligned with the textarea's own scrolling.
  test.addEventListener('scroll', function () {
    backdrop.scrollTop = test.scrollTop;
    backdrop.scrollLeft = test.scrollLeft;
  });

  pattern.addEventListener('input', update);
  test.addEventListener('input', update);
  repIn.addEventListener('input', update);
  FLAGS.forEach(function (f) { $('f-' + f).addEventListener('change', update); });

  $('clear').addEventListener('click', function () {
    test.value = ''; update(); test.focus();
  });

  function copied(btn) {
    var old = btn.textContent;
    btn.textContent = I18N.copied;
    setTimeout(function () { btn.textContent = old; }, 1000);
  }
  $('rep-copy').addEventListener('click', function () {
    var b = $('rep-copy'), t = repOut.textContent;
    var done = function () { copied(b); };
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(t).then(done, done);
    else done();
  });

  Array.prototype.forEach.call(document.querySelectorAll('.samples button'), function (b) {
    b.addEventListener('click', function () {
      pattern.value = b.getAttribute('data-p');
      var want = b.getAttribute('data-f');
      FLAGS.forEach(function (f) { $('f-' + f).checked = want.indexOf(f) !== -1; });
      update();
      pattern.focus();
    });
  });

  // Seed with a worked example so the page demonstrates itself on load.
  pattern.value = '(?<user>[\\w.+-]+)@(?<domain>[\\w-]+\\.[\\w.]+)';
  test.value = I18N.seedText;
  repIn.value = '$<user> [at] $<domain>';
  update();
})();
</script>
</body>
</html>
