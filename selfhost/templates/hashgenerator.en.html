<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{BRAND_NAME}} Hash Generator</title>
<meta name="referrer" content="no-referrer">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f141c" media="(prefers-color-scheme: dark)">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-48.png" type="image/png" sizes="48x48">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
:root{
  --bg:#f6f7f9; --card:#ffffff; --text:#1a2233; --muted:#5c6675;
  --accent:{{ACCENT}}; --accent-soft:{{ACCENT_SOFT}}; --border:#e3e7ee; --over:#dc2626;
  --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.1);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f141c; --card:#171e29; --text:#e8ecf3; --muted:#98a2b3;
    --accent:{{ACCENT_DARK}}; --accent-soft:{{ACCENT_SOFT_DARK}}; --border:#26303f; --over:#f87171;
    --shadow:0 1px 2px rgba(0,0,0,.4);
  }
}
*{box-sizing:border-box}
/* The UA rule for [hidden] is display:none at the lowest possible specificity,
   so any class rule that sets display silently defeats it and the element stays
   on screen. Anything hidden must actually be hidden. */
[hidden]{display:none!important}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--bg); color:var(--text);
  font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
.wrap{max-width:1080px;margin:0 auto;padding:0 16px}
a{color:var(--accent)}
header{position:relative;padding:36px 0 8px;text-align:center}
h1{font-size:2rem;margin:24px 0 12px;letter-spacing:-.02em}
.tagline{color:var(--muted);margin:0 auto;max-width:46rem}
.badge{
  display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:6px 12px;
  border:1px solid var(--accent);border-radius:999px;font-size:0.9rem;font-weight:600;
  color:var(--accent);background:var(--accent-soft)
}
.repo-link{display:block;margin-top:10px;font-size:.82rem;color:var(--muted);text-decoration:none}
.repo-link:hover{color:var(--accent);text-decoration:underline}
.repo-link svg{vertical-align:-2px;margin-right:5px}
nav.toc{margin:14px 0 0;font-size:.85rem;text-align:center}
nav.toc a{margin:0 8px;white-space:nowrap;text-decoration:none}
nav.toc a:hover{text-decoration:underline}
main{padding-bottom:24px}
section{margin:34px auto}
.prose{max-width:46rem}
h2{font-size:1.35rem;margin:0 0 10px;letter-spacing:-.01em}
h3{font-size:1.05rem;margin:22px 0 6px}
p{margin:0 0 12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow)}
.muted{color:var(--muted)}
.cross-link{text-align:center;margin:24px auto 0;font-size:.95rem;color:var(--muted)}
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
footer{border-top:1px solid var(--border);padding:22px 0 34px;text-align:center;font-size:.85rem;color:var(--muted)}
.lang{position:relative;display:inline-block;margin:0 0 14px;text-align:left;font-size:.85rem}
.lang summary{list-style:none;display:inline-block;cursor:pointer;padding:5px 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--muted);user-select:none}
.lang summary::-webkit-details-marker{display:none}
.lang summary:hover,.lang[open] summary{color:var(--accent);border-color:var(--accent)}
.lang ul{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);margin:0 0 6px;padding:6px;list-style:none;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);min-width:9em;z-index:10}
.lang li a,.lang li[aria-current]{display:block;padding:6px 10px;border-radius:6px;text-decoration:none;white-space:nowrap}
.lang li[aria-current]{color:var(--muted);font-weight:600}
.lang li a:hover{background:var(--accent-soft)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
:root{ --good:#16a34a; }
@media (prefers-color-scheme: dark){ :root{ --good:#4ade80; } }
.tabs{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 12px}
.tabs button{
  font:inherit;font-size:.9rem;padding:7px 16px;border-radius:8px;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:var(--text)
}
.tabs button:hover[aria-pressed="false"]{border-color:var(--accent);color:var(--accent)}
.tabs button[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.panel{padding:16px 18px}
#text-in{
  display:block;width:100%;min-height:120px;resize:vertical;
  padding:12px 14px;border:1px solid var(--border);border-radius:8px;
  background:var(--card);color:var(--text);
  font:.95rem/1.6 ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace
}
.drop{
  border:2px dashed var(--border);border-radius:10px;padding:26px 16px;text-align:center;
  color:var(--muted);cursor:pointer;transition:border-color .15s,background-color .15s
}
.drop:hover,.drop.over{border-color:var(--accent);background:var(--accent-soft)}
.drop strong{color:var(--text)}
.file-meta{margin:12px 0 0;font-size:.9rem;color:var(--muted);font-variant-numeric:tabular-nums}
.results{margin-top:14px;display:grid;gap:10px}
.hrow{display:grid;grid-template-columns:96px 1fr auto;gap:12px;align-items:center;padding:12px 14px}
@media (max-width:620px){.hrow{grid-template-columns:1fr;gap:6px}}
.hrow .algo{font-weight:700;font-size:.9rem}
.hrow .algo small{display:block;font-weight:400;color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.04em}
.hrow .digest{
  font:.85rem/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  overflow-wrap:anywhere;user-select:all;-webkit-user-select:all;color:var(--text)
}
.hrow .digest.weak{color:var(--muted)}
.hrow button.copy{
  font:inherit;font-size:.82rem;padding:6px 12px;border-radius:7px;cursor:pointer;justify-self:start;
  border:1px solid var(--border);background:var(--card);color:var(--text)
}
.hrow button.copy:hover{border-color:var(--accent);color:var(--accent)}
.setrow{display:flex;flex-wrap:wrap;align-items:center;gap:16px;margin:14px 2px 0;font-size:.88rem;color:var(--muted)}
.setrow label{display:flex;align-items:center;gap:8px;cursor:pointer}
.setrow input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent);margin:0}
.verify{margin-top:16px;padding:14px 16px}
.verify h2{font-size:.95rem;margin:0 0 8px}
.verify input{
  width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;
  background:var(--card);color:var(--text);
  font:.85rem/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace
}
.verify .result{margin:10px 0 0;font-weight:600;font-size:.92rem}
.verify .result.match{color:var(--good)}
.verify .result.nomatch{color:var(--over)}
.props{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media (max-width:760px){.props{grid-template-columns:1fr}}
.props div{padding:16px}
.props strong{display:block;margin-bottom:4px}
.props p{margin:0;font-size:.9rem;color:var(--muted)}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:var(--card);box-shadow:var(--shadow)}
table{border-collapse:collapse;width:100%;font-size:.92rem;min-width:460px}
caption{caption-side:bottom;text-align:left;font-size:.8rem;color:var(--muted);padding:10px 14px}
th,td{text-align:left;padding:9px 14px;border-bottom:1px solid var(--border)}
tbody tr:last-child td{border-bottom:0}
th{font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.faq p{color:var(--text)}

/* Mobile: let tables reflow to fit the viewport instead of scrolling.
   min-width would otherwise hold the table open and overflow the page.
   Headers drop uppercase so hyphens:auto can break long words like "Compression". */
@media (max-width:560px){
  table{min-width:0}
  th,td{padding-left:8px;padding-right:8px}
  td{overflow-wrap:break-word;-webkit-hyphens:auto;hyphens:auto}
  thead th{text-transform:none;letter-spacing:normal}
}
.brand-logo{height:56px;max-width:220px;object-fit:contain;display:block;margin:0 auto}
</style>
</head>
<body>

<header class="wrap">
  {{LOGO}}
  <h1>{{BRAND_NAME}} Hash Generator</h1>
</header>

<main class="wrap">

<section id="tool" aria-label="Hash generator">
    <div class="tabs" role="tablist" aria-label="Input type">
      <button type="button" id="tab-text" role="tab" aria-pressed="true">Hash text</button>
      <button type="button" id="tab-file" role="tab" aria-pressed="false">Hash a file</button>
    </div>

    <div class="card panel" id="pane-text">
      <label class="sr-only" for="text-in">Text to hash</label>
      <textarea id="text-in" spellcheck="false" autocomplete="off" placeholder="Type or paste text to hash…"></textarea>
    </div>

    <div class="card panel" id="pane-file" hidden>
      <div class="drop" id="drop" tabindex="0" role="button" aria-label="Choose a file to hash">
        <strong>Click to choose a file</strong> or drag &amp; drop<br>
        <span>The file is read and hashed locally, never uploaded.</span>
      </div>
      <input type="file" id="file-in" class="sr-only" aria-hidden="true">
      <p class="file-meta" id="file-meta" hidden></p>
    </div>

    <div class="setrow">
      <label><input type="checkbox" id="upper-toggle"> Uppercase output</label>
    </div>

    <div class="results" id="results" aria-live="polite"></div>

    <div class="card verify">
      <h2>Verify against an expected hash</h2>
      <label class="sr-only" for="verify-in">Expected hash</label>
      <input type="text" id="verify-in" spellcheck="false" autocomplete="off" placeholder="Paste an expected hash (any algorithm) to compare…">
      <p class="result" id="verify-result" hidden></p>
    </div>
  </section>

</main>

<footer>
{{LANG_SWITCH}}
<div class="wrap">{{FOOTER_ATTRIBUTION}}</div>
</footer>

<script>
/* Hashing helpers. MD5 is a pure inlined implementation; SHA-* use Web Crypto.
   The MD5 routine + hex helpers are returned for testability. */
var HASH = (function () {
  'use strict';

  // --- MD5 (RFC 1321), operates on a byte array, returns lowercase hex ---
  function md5bytes(bytes) {
    function add32(a, b) { return (a + b) & 0xffffffff; }
    function rol(n, c) { return (n << c) | (n >>> (32 - c)); }
    function cmn(q, a, b, x, s, t) { a = add32(add32(a, q), add32(x, t)); return add32(rol(a, s), b); }
    function ff(a, b, c, d, x, s, t) { return cmn((b & c) | (~b & d), a, b, x, s, t); }
    function gg(a, b, c, d, x, s, t) { return cmn((b & d) | (c & ~d), a, b, x, s, t); }
    function hh(a, b, c, d, x, s, t) { return cmn(b ^ c ^ d, a, b, x, s, t); }
    function ii(a, b, c, d, x, s, t) { return cmn(c ^ (b | ~d), a, b, x, s, t); }

    var n = bytes.length;
    var withOne = n + 1;
    // pad to 56 mod 64, then 8-byte length
    var padded = ((withOne + 8 + 63) >> 6) << 6;
    var buf = new Uint8Array(padded);
    buf.set(bytes);
    buf[n] = 0x80;
    var bitLenLo = (n << 3) >>> 0;
    var bitLenHi = Math.floor(n / 0x20000000) >>> 0; // n*8 high dword
    buf[padded - 8] = bitLenLo & 0xff;
    buf[padded - 7] = (bitLenLo >>> 8) & 0xff;
    buf[padded - 6] = (bitLenLo >>> 16) & 0xff;
    buf[padded - 5] = (bitLenLo >>> 24) & 0xff;
    buf[padded - 4] = bitLenHi & 0xff;
    buf[padded - 3] = (bitLenHi >>> 8) & 0xff;
    buf[padded - 2] = (bitLenHi >>> 16) & 0xff;
    buf[padded - 1] = (bitLenHi >>> 24) & 0xff;

    var a = 1732584193, b = -271733879, c = -1732584194, d = 271733878;
    var x = new Int32Array(16);
    for (var i = 0; i < padded; i += 64) {
      for (var j = 0; j < 16; j++) {
        var k = i + j * 4;
        x[j] = buf[k] | (buf[k + 1] << 8) | (buf[k + 2] << 16) | (buf[k + 3] << 24);
      }
      var oa = a, ob = b, oc = c, od = d;
      a = ff(a, b, c, d, x[0], 7, -680876936); d = ff(d, a, b, c, x[1], 12, -389564586);
      c = ff(c, d, a, b, x[2], 17, 606105819); b = ff(b, c, d, a, x[3], 22, -1044525330);
      a = ff(a, b, c, d, x[4], 7, -176418897); d = ff(d, a, b, c, x[5], 12, 1200080426);
      c = ff(c, d, a, b, x[6], 17, -1473231341); b = ff(b, c, d, a, x[7], 22, -45705983);
      a = ff(a, b, c, d, x[8], 7, 1770035416); d = ff(d, a, b, c, x[9], 12, -1958414417);
      c = ff(c, d, a, b, x[10], 17, -42063); b = ff(b, c, d, a, x[11], 22, -1990404162);
      a = ff(a, b, c, d, x[12], 7, 1804603682); d = ff(d, a, b, c, x[13], 12, -40341101);
      c = ff(c, d, a, b, x[14], 17, -1502002290); b = ff(b, c, d, a, x[15], 22, 1236535329);
      a = gg(a, b, c, d, x[1], 5, -165796510); d = gg(d, a, b, c, x[6], 9, -1069501632);
      c = gg(c, d, a, b, x[11], 14, 643717713); b = gg(b, c, d, a, x[0], 20, -373897302);
      a = gg(a, b, c, d, x[5], 5, -701558691); d = gg(d, a, b, c, x[10], 9, 38016083);
      c = gg(c, d, a, b, x[15], 14, -660478335); b = gg(b, c, d, a, x[4], 20, -405537848);
      a = gg(a, b, c, d, x[9], 5, 568446438); d = gg(d, a, b, c, x[14], 9, -1019803690);
      c = gg(c, d, a, b, x[3], 14, -187363961); b = gg(b, c, d, a, x[8], 20, 1163531501);
      a = gg(a, b, c, d, x[13], 5, -1444681467); d = gg(d, a, b, c, x[2], 9, -51403784);
      c = gg(c, d, a, b, x[7], 14, 1735328473); b = gg(b, c, d, a, x[12], 20, -1926607734);
      a = hh(a, b, c, d, x[5], 4, -378558); d = hh(d, a, b, c, x[8], 11, -2022574463);
      c = hh(c, d, a, b, x[11], 16, 1839030562); b = hh(b, c, d, a, x[14], 23, -35309556);
      a = hh(a, b, c, d, x[1], 4, -1530992060); d = hh(d, a, b, c, x[4], 11, 1272893353);
      c = hh(c, d, a, b, x[7], 16, -155497632); b = hh(b, c, d, a, x[10], 23, -1094730640);
      a = hh(a, b, c, d, x[13], 4, 681279174); d = hh(d, a, b, c, x[0], 11, -358537222);
      c = hh(c, d, a, b, x[3], 16, -722521979); b = hh(b, c, d, a, x[6], 23, 76029189);
      a = hh(a, b, c, d, x[9], 4, -640364487); d = hh(d, a, b, c, x[12], 11, -421815835);
      c = hh(c, d, a, b, x[15], 16, 530742520); b = hh(b, c, d, a, x[2], 23, -995338651);
      a = ii(a, b, c, d, x[0], 6, -198630844); d = ii(d, a, b, c, x[7], 10, 1126891415);
      c = ii(c, d, a, b, x[14], 15, -1416354905); b = ii(b, c, d, a, x[5], 21, -57434055);
      a = ii(a, b, c, d, x[12], 6, 1700485571); d = ii(d, a, b, c, x[3], 10, -1894986606);
      c = ii(c, d, a, b, x[10], 15, -1051523); b = ii(b, c, d, a, x[1], 21, -2054922799);
      a = ii(a, b, c, d, x[8], 6, 1873313359); d = ii(d, a, b, c, x[15], 10, -30611744);
      c = ii(c, d, a, b, x[6], 15, -1560198380); b = ii(b, c, d, a, x[13], 21, 1309151649);
      a = ii(a, b, c, d, x[4], 6, -145523070); d = ii(d, a, b, c, x[11], 10, -1120210379);
      c = ii(c, d, a, b, x[2], 15, 718787259); b = ii(b, c, d, a, x[9], 21, -343485551);
      a = add32(a, oa); b = add32(b, ob); c = add32(c, oc); d = add32(d, od);
    }
    var out = new Uint8Array(16), words = [a, b, c, d];
    for (var w = 0; w < 4; w++)
      for (var p = 0; p < 4; p++) out[w * 4 + p] = (words[w] >>> (p * 8)) & 0xff;
    return out;
  }

  function toHex(bytes) {
    var s = '';
    for (var i = 0; i < bytes.length; i++) s += (bytes[i] < 16 ? '0' : '') + bytes[i].toString(16);
    return s;
  }
  function utf8Bytes(str) {
    if (typeof TextEncoder !== 'undefined') return new TextEncoder().encode(str);
    return new Uint8Array(unescape(encodeURIComponent(str)).split('').map(function (c) { return c.charCodeAt(0); }));
  }
  function md5(str) { return toHex(md5bytes(utf8Bytes(str))); }

  return { md5bytes: md5bytes, md5: md5, toHex: toHex, utf8Bytes: utf8Bytes };
})();
if (typeof module !== 'undefined') module.exports = HASH;

(function () {
  'use strict';
  if (typeof document === 'undefined') return;
  var $ = function (id) { return document.getElementById(id); };
  var I18N = {
    "copy": "Copy",
    "copied": "Copied",
    "reading": "Reading {name}…",
    "readError": "Could not read that file.",
    "match": "✓ Match - this is the {algo} hash of the current input.",
    "noMatch": "✗ No match with any algorithm for the current input."
  };
  var LANG = document.documentElement.lang || 'en';
  var ALGOS = [
    { key: 'MD5', label: 'MD5', sub: '128-bit', weak: true },
    { key: 'SHA-1', label: 'SHA-1', sub: '160-bit', weak: true },
    { key: 'SHA-256', label: 'SHA-256', sub: '256-bit', weak: false },
    { key: 'SHA-384', label: 'SHA-384', sub: '384-bit', weak: false },
    { key: 'SHA-512', label: 'SHA-512', sub: '512-bit', weak: false }
  ];
  var current = { bytes: HASH.utf8Bytes(''), digests: {} };

  // Build result rows once
  var results = $('results');
  ALGOS.forEach(function (a) {
    var row = document.createElement('div');
    row.className = 'card hrow';
    row.innerHTML = '<div class="algo">' + a.label + '<small>' + a.sub + '</small></div>' +
      '<div class="digest' + (a.weak ? ' weak' : '') + '" id="d-' + a.key + '">…</div>' +
      '<button type="button" class="copy" data-algo="' + a.key + '">' + I18N.copy + '</button>';
    results.appendChild(row);
  });

  function fmt(hex) { return $('upper-toggle').checked ? hex.toUpperCase() : hex; }

  async function sha(name, bytes) {
    var buf = await crypto.subtle.digest(name, bytes);
    return HASH.toHex(new Uint8Array(buf));
  }

  var runId = 0;
  async function compute() {
    var id = ++runId;
    var bytes = current.bytes;
    var digests = {};
    digests['MD5'] = HASH.toHex(HASH.md5bytes(bytes));
    var shas = await Promise.all([
      sha('SHA-1', bytes), sha('SHA-256', bytes), sha('SHA-384', bytes), sha('SHA-512', bytes)
    ]);
    if (id !== runId) return; // superseded by newer input
    digests['SHA-1'] = shas[0]; digests['SHA-256'] = shas[1];
    digests['SHA-384'] = shas[2]; digests['SHA-512'] = shas[3];
    current.digests = digests;
    render();
    verify();
  }

  function render() {
    ALGOS.forEach(function (a) {
      var d = current.digests[a.key];
      $('d-' + a.key).textContent = d ? fmt(d) : '…';
    });
  }

  function verify() {
    var box = $('verify-in'), out = $('verify-result');
    var v = box.value.trim().toLowerCase().replace(/\s+/g, '');
    if (!v) { out.hidden = true; return; }
    var hit = null;
    for (var k in current.digests) if (current.digests[k] === v) { hit = k; break; }
    out.hidden = false;
    if (hit) { out.className = 'result match'; out.textContent = I18N.match.replace('{algo}', hit); }
    else { out.className = 'result nomatch'; out.textContent = I18N.noMatch; }
  }

  // --- Text mode ---
  var textIn = $('text-in');
  var debounce;
  textIn.addEventListener('input', function () {
    clearTimeout(debounce);
    debounce = setTimeout(function () {
      current.bytes = HASH.utf8Bytes(textIn.value);
      compute();
    }, 150);
  });

  // --- File mode ---
  var fileIn = $('file-in'), drop = $('drop'), fileMeta = $('file-meta');
  function loadFile(file) {
    if (!file) return;
    fileMeta.hidden = false;
    fileMeta.textContent = I18N.reading.replace('{name}', file.name);
    var reader = new FileReader();
    reader.onload = function () {
      current.bytes = new Uint8Array(reader.result);
      fileMeta.textContent = file.name + ' · ' + formatSize(file.size);
      compute();
    };
    reader.onerror = function () { fileMeta.textContent = I18N.readError; };
    reader.readAsArrayBuffer(file);
  }
  function formatSize(n) {
    if (n < 1024) return n.toLocaleString(LANG) + ' B';
    if (n < 1048576) return (n / 1024).toLocaleString(LANG, { maximumFractionDigits: 1 }) + ' KB';
    return (n / 1048576).toLocaleString(LANG, { maximumFractionDigits: 2 }) + ' MB';
  }
  drop.addEventListener('click', function () { fileIn.click(); });
  drop.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileIn.click(); } });
  fileIn.addEventListener('change', function () { loadFile(fileIn.files[0]); });
  ['dragenter', 'dragover'].forEach(function (ev) {
    drop.addEventListener(ev, function (e) { e.preventDefault(); drop.classList.add('over'); });
  });
  ['dragleave', 'drop'].forEach(function (ev) {
    drop.addEventListener(ev, function (e) { e.preventDefault(); drop.classList.remove('over'); });
  });
  drop.addEventListener('drop', function (e) { if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });

  // --- Tabs ---
  function selectTab(which) {
    var isText = which === 'text';
    $('tab-text').setAttribute('aria-pressed', String(isText));
    $('tab-file').setAttribute('aria-pressed', String(!isText));
    $('pane-text').hidden = !isText;
    $('pane-file').hidden = isText;
    if (isText) { current.bytes = HASH.utf8Bytes(textIn.value); compute(); }
    else if (fileIn.files[0]) loadFile(fileIn.files[0]);
    else { current.bytes = HASH.utf8Bytes(''); compute(); }
  }
  $('tab-text').addEventListener('click', function () { selectTab('text'); });
  $('tab-file').addEventListener('click', function () { selectTab('file'); });

  // --- Copy + settings ---
  results.addEventListener('click', function (e) {
    var btn = e.target.closest('button.copy');
    if (!btn) return;
    var d = current.digests[btn.getAttribute('data-algo')];
    if (!d) return;
    var text = fmt(d);
    var done = function () { var o = btn.textContent; btn.textContent = I18N.copied; setTimeout(function () { btn.textContent = o; }, 1200); };
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(done, done);
    else done();
  });
  $('upper-toggle').addEventListener('change', function () { render(); });
  $('verify-in').addEventListener('input', verify);

  compute();
})();
</script>
</body>
</html>
