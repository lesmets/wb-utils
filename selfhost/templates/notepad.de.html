<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{BRAND_NAME}} Online-Notizblock</title>
<meta name="referrer" content="no-referrer">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f141c" media="(prefers-color-scheme: dark)">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="icon" href="../favicon-48.png" type="image/png" sizes="48x48">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">
<style>
:root{
  --bg:#f6f7f9; --card:#ffffff; --text:#1a2233; --muted:#5c6675;
  --accent:{{ACCENT}}; --accent-soft:{{ACCENT_SOFT}}; --border:#e3e7ee; --over:#dc2626;
  --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.1);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f141c; --card:#171e29; --text:#e8ecf3; --muted:#98a2b3;
    --accent:{{ACCENT_DARK}}; --accent-soft:{{ACCENT_SOFT_DARK}}; --border:#26303f; --over:#f87171;
    --shadow:0 1px 2px rgba(0,0,0,.4);
  }
}
*{box-sizing:border-box}
/* The UA rule for [hidden] is display:none at the lowest possible specificity,
   so any class rule that sets display silently defeats it and the element stays
   on screen. Anything hidden must actually be hidden. */
[hidden]{display:none!important}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--bg); color:var(--text);
  font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
.wrap{max-width:1080px;margin:0 auto;padding:0 16px}
a{color:var(--accent)}
header{position:relative;padding:36px 0 8px;text-align:center}
h1{font-size:2rem;margin:24px 0 12px;letter-spacing:-.02em}
.tagline{color:var(--muted);margin:0 auto;max-width:46rem}
.badge{
  display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:6px 12px;
  border:1px solid var(--accent);border-radius:999px;font-size:0.9rem;font-weight:600;
  color:var(--accent);background:var(--accent-soft)
}
.repo-link{display:block;margin-top:10px;font-size:.82rem;color:var(--muted);text-decoration:none}
.repo-link:hover{color:var(--accent);text-decoration:underline}
.repo-link svg{vertical-align:-2px;margin-right:5px}
nav.toc{margin:14px 0 0;font-size:.85rem;text-align:center}
nav.toc a{margin:0 8px;white-space:nowrap;text-decoration:none}
nav.toc a:hover{text-decoration:underline}
main{padding-bottom:24px}
section{margin:34px auto}
.prose{max-width:46rem}
h2{font-size:1.35rem;margin:0 0 10px;letter-spacing:-.01em}
h3{font-size:1.05rem;margin:22px 0 6px}
p{margin:0 0 12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow)}
.muted{color:var(--muted)}
.cross-link{text-align:center;margin:24px auto 0;font-size:.95rem;color:var(--muted)}
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
footer{border-top:1px solid var(--border);padding:22px 0 34px;text-align:center;font-size:.85rem;color:var(--muted)}
.lang{position:relative;display:inline-block;margin:0 0 14px;text-align:left;font-size:.85rem}
.lang summary{list-style:none;display:inline-block;cursor:pointer;padding:5px 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--muted);user-select:none}
.lang summary::-webkit-details-marker{display:none}
.lang summary:hover,.lang[open] summary{color:var(--accent);border-color:var(--accent)}
.lang ul{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);margin:0 0 6px;padding:6px;list-style:none;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);min-width:9em;z-index:10}
.lang li a,.lang li[aria-current]{display:block;padding:6px 10px;border-radius:6px;text-decoration:none;white-space:nowrap}
.lang li[aria-current]{color:var(--muted);font-weight:600}
.lang li a:hover{background:var(--accent-soft)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
:root{ --good:#16a34a; }
@media (prefers-color-scheme: dark){ :root{ --good:#4ade80; } }
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:18px 0 10px}
.toolbar button{
  font:inherit;font-size:.9rem;padding:8px 16px;border-radius:8px;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:var(--text)
}
.toolbar button:hover{border-color:var(--accent);color:var(--accent)}
.toolbar button.danger:hover{border-color:var(--over);color:var(--over)}
.toolbar .spacer{flex:1}
.status{font-size:.82rem;color:var(--muted);font-variant-numeric:tabular-nums}
.status.saved{color:var(--good)}
.editor-card{padding:0;overflow:hidden}
#pad{
  display:block;width:100%;min-height:56vh;resize:vertical;border:0;outline:0;
  padding:18px 20px;background:var(--card);color:var(--text);
  font:1rem/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif
}
#pad.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace}
.counts{display:flex;flex-wrap:wrap;gap:8px 22px;margin:12px 2px 0;font-size:.88rem;color:var(--muted);font-variant-numeric:tabular-nums}
.counts strong{color:var(--text)}
.setrow{display:flex;flex-wrap:wrap;align-items:center;gap:16px;margin:14px 2px 0;font-size:.88rem;color:var(--muted)}
.setrow label{display:flex;align-items:center;gap:8px;cursor:pointer}
.setrow input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent);margin:0}
.setrow input[type="range"]{accent-color:var(--accent)}
.props{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media (max-width:760px){.props{grid-template-columns:1fr}}
.props div{padding:16px}
.props strong{display:block;margin-bottom:4px}
.props p{margin:0;font-size:.9rem;color:var(--muted)}
.faq p{color:var(--text)}
.brand-logo{height:56px;max-width:220px;object-fit:contain;display:block;margin:0 auto}
</style>
</head>
<body>

<header class="wrap">
  {{LOGO}}
  <h1>{{BRAND_NAME}} Online-Notizblock</h1>
</header>

<main class="wrap">

<section id="tool" aria-label="Online-Notizblock">
    <div class="toolbar">
      <button type="button" id="copy-btn">Kopieren</button>
      <button type="button" id="download-btn">Als .txt herunterladen</button>
      <button type="button" id="print-btn">Drucken</button>
      <button type="button" id="clear-btn" class="danger">Leeren</button>
      <span class="spacer"></span>
      <span class="status" id="status" aria-live="polite">Bereit</span>
    </div>

    <div class="card editor-card">
      <label class="sr-only" for="pad">Notizblock</label>
      <textarea id="pad" spellcheck="true" autocomplete="off" autocapitalize="sentences"
        placeholder="Einfach lostippen. Deine Notizen werden automatisch auf diesem Gerät gespeichert&#10;&#10;Nichts davon wird hochgeladen. Alles bleibt in deinem Browser."></textarea>
    </div>

    <div class="counts" aria-live="polite">
      <span><strong id="c-words">0</strong> Wörter</span>
      <span><strong id="c-chars">0</strong> Zeichen</span>
      <span><strong id="c-nospace">0</strong> ohne Leerzeichen</span>
      <span><strong id="c-lines">0</strong> Zeilen</span>
    </div>

    <div class="setrow">
      <label><input type="checkbox" id="mono-toggle"> Monospace-Schrift</label>
      <label>Textgröße
        <input type="range" id="size-range" min="14" max="26" step="1" value="16" aria-label="Textgröße">
      </label>
    </div>
  </section>

</main>

<footer>
{{LANG_SWITCH}}
<div class="wrap">{{FOOTER_ATTRIBUTION}}</div>
</footer>

<script>
/* Text metrics for the notepad. Pure functions, returned for testability. */
var NP = (function () {
  'use strict';
  function counts(text) {
    text = text == null ? '' : String(text);
    var words = (text.match(/\S+/g) || []).length;
    var chars = text.length;
    var noSpace = text.replace(/\s/g, '').length;
    var lines = text === '' ? 0 : text.split('\n').length;
    return { words: words, chars: chars, noSpace: noSpace, lines: lines };
  }
  return { counts: counts };
})();
if (typeof module !== 'undefined') module.exports = NP;

(function () {
  'use strict';
  if (typeof document === 'undefined') return;
  var $ = function (id) { return document.getElementById(id); };
  var KEY = 'wb-notepad', PREF = 'wb-notepad-prefs';
  var pad = $('pad'), status = $('status');
  var saveTimer = null;
  var I18N = {
    "ready": "Bereit",
    "saved": "Gespeichert",
    "saving": "Wird gespeichert…",
    "saveFailed": "Speichern nicht möglich (Speicher voll oder blockiert)",
    "loaded": "Von diesem Gerät geladen",
    "nothingToCopy": "Nichts zu kopieren",
    "copied": "In die Zwischenablage kopiert",
    "downloaded": "{file} heruntergeladen",
    "file": "notizen.txt",
    "confirmClear": "Notizblock leeren? Das kann nicht rückgängig gemacht werden."
  };
  var LANG = document.documentElement.lang || 'en';

  function refreshCounts() {
    var c = NP.counts(pad.value);
    $('c-words').textContent = c.words.toLocaleString(LANG);
    $('c-chars').textContent = c.chars.toLocaleString(LANG);
    $('c-nospace').textContent = c.noSpace.toLocaleString(LANG);
    $('c-lines').textContent = c.lines.toLocaleString(LANG);
  }

  function setStatus(text, saved) {
    status.textContent = text;
    status.className = 'status' + (saved ? ' saved' : '');
  }

  function save() {
    try { localStorage.setItem(KEY, pad.value); setStatus(I18N.saved, true); }
    catch (e) { setStatus(I18N.saveFailed, false); }
  }

  function queueSave() {
    setStatus(I18N.saving, false);
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(save, 400);
  }

  function onInput() { refreshCounts(); queueSave(); }

  // Restore note + prefs
  try {
    var saved = localStorage.getItem(KEY);
    if (saved != null) pad.value = saved;
  } catch (e) {}
  var prefs = {};
  try { prefs = JSON.parse(localStorage.getItem(PREF) || '{}') || {}; } catch (e) {}

  var mono = $('mono-toggle'), size = $('size-range');
  if (prefs.mono) { mono.checked = true; pad.classList.add('mono'); }
  if (prefs.size) { size.value = prefs.size; pad.style.fontSize = prefs.size + 'px'; }

  function savePrefs() {
    try { localStorage.setItem(PREF, JSON.stringify({ mono: mono.checked, size: size.value })); } catch (e) {}
  }

  refreshCounts();
  setStatus(pad.value ? I18N.loaded : I18N.ready, Boolean(pad.value));

  pad.addEventListener('input', onInput);
  // Save immediately if the page is being hidden/closed mid-edit.
  window.addEventListener('beforeunload', save);
  document.addEventListener('visibilitychange', function () { if (document.hidden) save(); });

  mono.addEventListener('change', function () { pad.classList.toggle('mono', mono.checked); savePrefs(); });
  size.addEventListener('input', function () { pad.style.fontSize = size.value + 'px'; savePrefs(); });

  $('copy-btn').addEventListener('click', function () {
    if (!pad.value) { setStatus(I18N.nothingToCopy, false); return; }
    var done = function () { setStatus(I18N.copied, true); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(pad.value).then(done, function () { pad.select(); document.execCommand('copy'); done(); });
    } else { pad.select(); document.execCommand('copy'); done(); }
  });

  $('download-btn').addEventListener('click', function () {
    var blob = new Blob([pad.value], { type: 'text/plain;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = I18N.file;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    setStatus(I18N.downloaded.replace('{file}', I18N.file), true);
  });

  $('print-btn').addEventListener('click', function () { window.print(); });

  $('clear-btn').addEventListener('click', function () {
    if (!pad.value) return;
    if (!window.confirm(I18N.confirmClear)) return;
    pad.value = '';
    refreshCounts(); save(); pad.focus();
  });
})();
</script>
</body>
</html>
