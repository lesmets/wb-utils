<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{BRAND_NAME}} Unit Converter</title>
<meta name="referrer" content="no-referrer">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f141c" media="(prefers-color-scheme: dark)">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-48.png" type="image/png" sizes="48x48">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
:root{
  --bg:#f6f7f9; --card:#ffffff; --text:#1a2233; --muted:#5c6675;
  --accent:{{ACCENT}}; --accent-soft:{{ACCENT_SOFT}}; --border:#e3e7ee; --over:#dc2626;
  --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.1);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f141c; --card:#171e29; --text:#e8ecf3; --muted:#98a2b3;
    --accent:{{ACCENT_DARK}}; --accent-soft:{{ACCENT_SOFT_DARK}}; --border:#26303f; --over:#f87171;
    --shadow:0 1px 2px rgba(0,0,0,.4);
  }
}
*{box-sizing:border-box}
/* The UA rule for [hidden] is display:none at the lowest possible specificity,
   so any class rule that sets display silently defeats it and the element stays
   on screen. Anything hidden must actually be hidden. */
[hidden]{display:none!important}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--bg); color:var(--text);
  font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
.wrap{max-width:1080px;margin:0 auto;padding:0 16px}
a{color:var(--accent)}
header{position:relative;padding:36px 0 8px;text-align:center}
h1{font-size:2rem;margin:24px 0 12px;letter-spacing:-.02em}
.tagline{color:var(--muted);margin:0 auto;max-width:46rem}
.badge{
  display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:6px 12px;
  border:1px solid var(--accent);border-radius:999px;font-size:0.9rem;font-weight:600;
  color:var(--accent);background:var(--accent-soft)
}
.repo-link{display:block;margin-top:10px;font-size:.82rem;color:var(--muted);text-decoration:none}
.repo-link:hover{color:var(--accent);text-decoration:underline}
.repo-link svg{vertical-align:-2px;margin-right:5px}
nav.toc{margin:14px 0 0;font-size:.85rem;text-align:center}
nav.toc a{margin:0 8px;white-space:nowrap;text-decoration:none}
nav.toc a:hover{text-decoration:underline}
main{padding-bottom:24px}
section{margin:34px auto}
.prose{max-width:46rem}
h2{font-size:1.35rem;margin:0 0 10px;letter-spacing:-.01em}
h3{font-size:1.05rem;margin:22px 0 6px}
p{margin:0 0 12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow)}
.muted{color:var(--muted)}
.cross-link{text-align:center;margin:24px auto 0;font-size:.95rem;color:var(--muted)}
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
footer{border-top:1px solid var(--border);padding:22px 0 34px;text-align:center;font-size:.85rem;color:var(--muted)}
.lang{position:relative;display:inline-block;margin:0 0 14px;text-align:left;font-size:.85rem}
.lang summary{list-style:none;display:inline-block;cursor:pointer;padding:5px 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--muted);user-select:none}
.lang summary::-webkit-details-marker{display:none}
.lang summary:hover,.lang[open] summary{color:var(--accent);border-color:var(--accent)}
.lang ul{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);margin:0 0 6px;padding:6px;list-style:none;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);min-width:9em;z-index:10}
.lang li a,.lang li[aria-current]{display:block;padding:6px 10px;border-radius:6px;text-decoration:none;white-space:nowrap}
.lang li[aria-current]{color:var(--muted);font-weight:600}
.lang li a:hover{background:var(--accent-soft)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.tabs{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 10px}
.tabs button{
  font:inherit;font-size:.85rem;padding:6px 14px;border-radius:8px;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:var(--text)
}
.tabs button:hover[aria-pressed="false"]{border-color:var(--accent);color:var(--accent)}
.tabs button[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.conv{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;padding:18px 20px;align-items:start}
@media (max-width:700px){.conv{grid-template-columns:1fr}}
.side{display:flex;flex-direction:column;gap:8px}
.side label{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.side input{
  width:100%;font:600 1.35rem/1.4 inherit;font-variant-numeric:tabular-nums;
  padding:10px 12px;border:1px solid var(--border);border-radius:10px;
  background:var(--card);color:var(--text)
}
.side select{
  width:100%;font:inherit;font-size:.95rem;padding:8px 10px;border-radius:10px;
  border:1px solid var(--border);background:var(--card);color:var(--text)
}
.swap{align-self:center;margin-top:18px}
@media (max-width:700px){.swap{margin:0 auto}}
.swap button{
  font-size:1.2rem;width:44px;height:44px;border-radius:50%;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:var(--accent)
}
.swap button:hover{border-color:var(--accent);background:var(--accent-soft)}
.formula{padding:12px 20px;margin-top:10px;font-size:.92rem;color:var(--muted)}
.formula strong{color:var(--text);font-variant-numeric:tabular-nums}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.chips button{
  font:inherit;font-size:.82rem;padding:5px 12px;border-radius:999px;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:var(--muted)
}
.chips button:hover{border-color:var(--accent);color:var(--accent)}
.props{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media (max-width:760px){.props{grid-template-columns:1fr}}
.props div{padding:16px}
.props strong{display:block;margin-bottom:4px}
.props p{margin:0;font-size:.9rem;color:var(--muted)}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:var(--card);box-shadow:var(--shadow)}
table{border-collapse:collapse;width:100%;font-size:.92rem;min-width:300px}
caption{caption-side:bottom;text-align:left;font-size:.8rem;color:var(--muted);padding:10px 14px}
th,td{text-align:left;padding:9px 14px;border-bottom:1px solid var(--border)}
tbody tr:last-child td{border-bottom:0}
th{font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
td{font-variant-numeric:tabular-nums}
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:46rem}
@media (max-width:700px){.cols2{grid-template-columns:1fr}}
.faq p{color:var(--text)}
.brand-logo{height:56px;max-width:220px;object-fit:contain;display:block;margin:24px auto 0}
</style>
</head>
<body>

<header class="wrap">
  {{LOGO}}
  <h1>{{BRAND_NAME}} Unit Converter</h1>
</header>

<main class="wrap">

<section id="tool" aria-label="Unit converter tool">
    <div class="tabs" role="group" aria-label="Unit category" id="cat-tabs"></div>

    <div class="conv card">
      <div class="side">
        <label for="val-a" id="label-a">From</label>
        <input type="text" id="val-a" value="1" inputmode="decimal" autocomplete="off" spellcheck="false">
        <select id="unit-a" aria-label="Convert from unit"></select>
      </div>
      <div class="swap">
        <button type="button" id="btn-swap" aria-label="Swap units" title="Swap units">⇄</button>
      </div>
      <div class="side">
        <label for="val-b" id="label-b">To</label>
        <input type="text" id="val-b" inputmode="decimal" autocomplete="off" spellcheck="false">
        <select id="unit-b" aria-label="Convert to unit"></select>
      </div>
    </div>

    <div class="formula card" id="formula" aria-live="polite"></div>

    <div class="chips" id="chips" role="group" aria-label="Popular conversions"></div>
  </section>

</main>

<footer>
{{LANG_SWITCH}}
<div class="wrap">{{FOOTER_ATTRIBUTION}}</div>
</footer>

<script>
/* Conversion engine. Factors are the exact international definitions,
   expressed relative to each category's base unit. Temperature uses functions. */
var UC = (function () {
  'use strict';

  // Each unit is [id, factor-to-base]; display names are localized in the UI
  // layer (I18N.unitNames) so translation never touches the physics.
  var CATS = {
    length: { units: [
      ['mm', 0.001], ['cm', 0.01], ['m', 1], ['km', 1000],
      ['in', 0.0254], ['ft', 0.3048], ['yd', 0.9144], ['mi', 1609.344], ['nmi', 1852]
    ]},
    weight: { units: [
      ['mg', 0.000001], ['g', 0.001], ['kg', 1], ['t', 1000],
      ['oz', 0.028349523125], ['lb', 0.45359237], ['st', 6.35029318], ['ton', 907.18474]
    ]},
    temperature: { temp: true, units: [['C'], ['F'], ['K']] },
    area: { units: [
      ['cm2', 0.0001], ['m2', 1], ['ha', 10000], ['km2', 1000000],
      ['in2', 0.00064516], ['ft2', 0.09290304], ['yd2', 0.83612736],
      ['ac', 4046.8564224], ['mi2', 2589988.110336]
    ]},
    volume: { units: [
      ['ml', 0.001], ['l', 1], ['m3', 1000],
      ['tsp', 0.00492892159375], ['tbsp', 0.01478676478125], ['floz', 0.0295735295625],
      ['cup', 0.2365882365], ['pt', 0.473176473], ['qt', 0.946352946],
      ['gal', 3.785411784], ['galuk', 4.54609], ['ft3', 28.316846592]
    ]},
    speed: { units: [
      ['ms', 1], ['kmh', 0.2777777777777778], ['mph', 0.44704],
      ['fts', 0.3048], ['kn', 0.5144444444444445]
    ]},
    time: { units: [
      ['msec', 0.001], ['s', 1], ['min', 60], ['h', 3600],
      ['d', 86400], ['wk', 604800], ['mo', 2629746], ['yr', 31556952]
    ]},
    data: { units: [
      ['bit', 0.125], ['B', 1], ['kB', 1000], ['MB', 1000000],
      ['GB', 1000000000], ['TB', 1000000000000], ['KiB', 1024], ['MiB', 1048576],
      ['GiB', 1073741824], ['TiB', 1099511627776]
    ]},
    pressure: { units: [
      ['Pa', 1], ['kPa', 1000], ['MPa', 1000000], ['bar', 100000],
      ['psi', 6894.757293168361], ['atm', 101325], ['mmHg', 133.322387415]
    ]},
    energy: { units: [
      ['J', 1], ['kJ', 1000], ['cal', 4.184], ['kcal', 4184],
      ['Wh', 3600], ['kWh', 3600000], ['BTU', 1055.05585262], ['ftlb', 1.3558179483314004]
    ]}
  };

  var TEMP_TO_C = {
    C: function (v) { return v; },
    F: function (v) { return (v - 32) * 5 / 9; },
    K: function (v) { return v - 273.15; }
  };
  var TEMP_FROM_C = {
    C: function (v) { return v; },
    F: function (v) { return v * 9 / 5 + 32; },
    K: function (v) { return v + 273.15; }
  };
  var TEMP_FORMULA = {
    'C-F': '°F = °C × 9/5 + 32',
    'F-C': '°C = (°F − 32) × 5/9',
    'C-K': 'K = °C + 273.15',
    'K-C': '°C = K − 273.15',
    'F-K': 'K = (°F − 32) × 5/9 + 273.15',
    'K-F': '°F = (K − 273.15) × 9/5 + 32'
  };

  function unitOf(cat, id) {
    var us = CATS[cat].units;
    for (var i = 0; i < us.length; i++) if (us[i][0] === id) return us[i];
    return null;
  }

  var LANG = (typeof document !== 'undefined' && document.documentElement.lang) || 'en';
  // The page's decimal mark, derived from the formatter itself.
  var DEC = (function () { var s = (1.5).toLocaleString(LANG); return s[s.length - 2]; })();
  var GRP = (function () { var s = (1234).toLocaleString(LANG); return /\d/.test(s[1]) ? '' : s[1]; })();

  function convert(cat, from, to, v) {
    if (CATS[cat].temp) return TEMP_FROM_C[to](TEMP_TO_C[from](v));
    return v * unitOf(cat, from)[1] / unitOf(cat, to)[1];
  }

  function parseNum(s) {
    s = String(s).trim();
    if (!s) return NaN;
    if (GRP) s = s.split(GRP).join('');
    if (DEC !== '.') s = s.split(DEC).join('.');
    return Number(s);
  }

  // Swap the canonical '.' decimal for the locale's, without grouping (the
  // result lands in an editable field that parseNum must read straight back).
  function loc(s) { return DEC === '.' ? s : s.replace('.', DEC); }

  function fmt(n) {
    if (!isFinite(n)) return '';
    if (n === 0) return '0';
    var a = Math.abs(n);
    if (a >= 1e15 || a < 1e-9) {
      return loc(n.toExponential(6).replace(/\.?0+e/, 'e'));
    }
    var s = n.toPrecision(10);
    if (s.indexOf('e') !== -1) return loc(fmtExp(n));
    if (s.indexOf('.') !== -1) s = s.replace(/0+$/, '').replace(/\.$/, '');
    return loc(s);
  }
  function fmtExp(n) {
    return n.toExponential(6).replace(/\.?0+e/, 'e');
  }

  // factor formatted for the formula line (6 significant digits, trimmed)
  function fmtFactor(n) {
    var s = n.toPrecision(6);
    if (s.indexOf('e') !== -1) return loc(n.toExponential(4).replace(/\.?0+e/, 'e'));
    if (s.indexOf('.') !== -1) s = s.replace(/0+$/, '').replace(/\.$/, '');
    return loc(s);
  }

  return { CATS: CATS, TEMP_FORMULA: TEMP_FORMULA, convert: convert, parseNum: parseNum, fmt: fmt, fmtFactor: fmtFactor };
})();
if (typeof module !== 'undefined') module.exports = UC;

(function () {
  'use strict';
  if (typeof document === 'undefined') return;
  var $ = function (id) { return document.getElementById(id); };
  var valA = $('val-a'), valB = $('val-b'), unitA = $('unit-a'), unitB = $('unit-b');
  var cat = 'length', lastEdited = 'a';
  var I18N = {
    "catLabels": {
      "length": "Length", "weight": "Weight", "temperature": "Temperature",
      "area": "Area", "volume": "Volume", "speed": "Speed", "time": "Time",
      "data": "Data", "pressure": "Pressure", "energy": "Energy"
    },
    "unitNames": {
      "length": { "mm": "Millimeters (mm)", "cm": "Centimeters (cm)", "m": "Meters (m)", "km": "Kilometers (km)", "in": "Inches (in)", "ft": "Feet (ft)", "yd": "Yards (yd)", "mi": "Miles (mi)", "nmi": "Nautical miles (nmi)" },
      "weight": { "mg": "Milligrams (mg)", "g": "Grams (g)", "kg": "Kilograms (kg)", "t": "Metric tons (t)", "oz": "Ounces (oz)", "lb": "Pounds (lb)", "st": "Stones (st)", "ton": "US tons (ton)" },
      "temperature": { "C": "Celsius (°C)", "F": "Fahrenheit (°F)", "K": "Kelvin (K)" },
      "area": { "cm2": "Square centimeters (cm²)", "m2": "Square meters (m²)", "ha": "Hectares (ha)", "km2": "Square kilometers (km²)", "in2": "Square inches (in²)", "ft2": "Square feet (ft²)", "yd2": "Square yards (yd²)", "ac": "Acres (ac)", "mi2": "Square miles (mi²)" },
      "volume": { "ml": "Milliliters (ml)", "l": "Liters (l)", "m3": "Cubic meters (m³)", "tsp": "Teaspoons, US (tsp)", "tbsp": "Tablespoons, US (tbsp)", "floz": "Fluid ounces, US (fl oz)", "cup": "Cups, US (cup)", "pt": "Pints, US (pt)", "qt": "Quarts, US (qt)", "gal": "Gallons, US (gal)", "galuk": "Gallons, imperial (gal UK)", "ft3": "Cubic feet (ft³)" },
      "speed": { "ms": "Meters per second (m/s)", "kmh": "Kilometers per hour (km/h)", "mph": "Miles per hour (mph)", "fts": "Feet per second (ft/s)", "kn": "Knots (kn)" },
      "time": { "msec": "Milliseconds (ms)", "s": "Seconds (s)", "min": "Minutes (min)", "h": "Hours (h)", "d": "Days (d)", "wk": "Weeks (wk)", "mo": "Months, average (mo)", "yr": "Years, average (yr)" },
      "data": { "bit": "Bits (bit)", "B": "Bytes (B)", "kB": "Kilobytes (kB, 1000)", "MB": "Megabytes (MB)", "GB": "Gigabytes (GB)", "TB": "Terabytes (TB)", "KiB": "Kibibytes (KiB, 1024)", "MiB": "Mebibytes (MiB)", "GiB": "Gibibytes (GiB)", "TiB": "Tebibytes (TiB)" },
      "pressure": { "Pa": "Pascals (Pa)", "kPa": "Kilopascals (kPa)", "MPa": "Megapascals (MPa)", "bar": "Bars (bar)", "psi": "Pounds per sq. inch (psi)", "atm": "Atmospheres (atm)", "mmHg": "Millimeters of mercury (mmHg)" },
      "energy": { "J": "Joules (J)", "kJ": "Kilojoules (kJ)", "cal": "Calories (cal)", "kcal": "Kilocalories (kcal)", "Wh": "Watt-hours (Wh)", "kWh": "Kilowatt-hours (kWh)", "BTU": "British thermal units (BTU)", "ftlb": "Foot-pounds (ft⋅lb)" }
    },
    "chips": {
      "cm-in": "cm → inches", "m-ft": "m → feet", "kg-lb": "kg → pounds", "mi-km": "miles → km",
      "c-f": "°C → °F", "l-gal": "liters → gallons", "kmh-mph": "km/h → mph", "mb-gb": "MB → GB"
    },
    "sameScale": "Same scale - no conversion needed.",
    "formulaPrefix": "Formula: ",
    "factorLine": "1 {from} = {f1} {to} · 1 {to} = {f2} {from}",
    "convertTail": " - to convert {from} to {to}, multiply the value by {f1}."
  };

  var DEFAULTS = {
    length: ['cm', 'in'], weight: ['kg', 'lb'], temperature: ['C', 'F'],
    area: ['m2', 'ft2'], volume: ['l', 'gal'], speed: ['kmh', 'mph'],
    time: ['h', 'min'], data: ['MB', 'GB'], pressure: ['bar', 'psi'], energy: ['kcal', 'kJ']
  };
  var CHIPS = [
    ['length', 'cm', 'in', 'cm-in'],
    ['length', 'm', 'ft', 'm-ft'],
    ['weight', 'kg', 'lb', 'kg-lb'],
    ['length', 'mi', 'km', 'mi-km'],
    ['temperature', 'C', 'F', 'c-f'],
    ['volume', 'l', 'gal', 'l-gal'],
    ['speed', 'kmh', 'mph', 'kmh-mph'],
    ['data', 'MB', 'GB', 'mb-gb']
  ];

  // build category tabs
  var tabBox = $('cat-tabs');
  Object.keys(UC.CATS).forEach(function (key) {
    var b = document.createElement('button');
    b.type = 'button';
    b.textContent = I18N.catLabels[key];
    b.setAttribute('aria-pressed', String(key === cat));
    b.addEventListener('click', function () { setCat(key, null, null); });
    b.dataset.cat = key;
    tabBox.appendChild(b);
  });

  // build chips
  CHIPS.forEach(function (c) {
    var b = document.createElement('button');
    b.type = 'button';
    b.textContent = I18N.chips[c[3]];
    b.addEventListener('click', function () {
      setCat(c[0], c[1], c[2]);
      valA.focus();
      valA.select();
    });
    $('chips').appendChild(b);
  });

  function fillSelect(sel, catKey) {
    sel.textContent = '';
    UC.CATS[catKey].units.forEach(function (u) {
      var o = document.createElement('option');
      o.value = u[0];
      o.textContent = I18N.unitNames[catKey][u[0]];
      sel.appendChild(o);
    });
  }

  function setCat(key, ua, ub) {
    cat = key;
    Array.prototype.forEach.call(tabBox.children, function (b) {
      b.setAttribute('aria-pressed', String(b.dataset.cat === key));
    });
    fillSelect(unitA, key);
    fillSelect(unitB, key);
    unitA.value = ua || DEFAULTS[key][0];
    unitB.value = ub || DEFAULTS[key][1];
    if (!UC.parseNum(valA.value) && valA.value !== '0') valA.value = '1';
    lastEdited = 'a';
    update();
  }

  function symbol(id) {
    var name = I18N.unitNames[cat][id];
    if (!name) return id;
    var m = name.match(/\(([^)]+)\)$/);
    return m ? m[1].replace(/,.*$/, '') : id;
  }

  function renderFormula() {
    var box = $('formula');
    box.textContent = '';
    var from = unitA.value, to = unitB.value;
    if (UC.CATS[cat].temp) {
      var f = from === to ? I18N.sameScale : I18N.formulaPrefix + UC.TEMP_FORMULA[from + '-' + to];
      var s = document.createElement('strong');
      s.textContent = f;
      box.appendChild(s);
      return;
    }
    var factor = UC.convert(cat, from, to, 1);
    var inverse = UC.convert(cat, to, from, 1);
    var strong = document.createElement('strong');
    strong.textContent = I18N.factorLine
      .replace('{from}', symbol(from)).replace('{f1}', UC.fmtFactor(factor)).replace('{to}', symbol(to))
      .replace('{to}', symbol(to)).replace('{f2}', UC.fmtFactor(inverse)).replace('{from}', symbol(from));
    box.appendChild(strong);
    box.appendChild(document.createTextNode(I18N.convertTail
      .replace('{from}', symbol(from)).replace('{to}', symbol(to)).replace('{f1}', UC.fmtFactor(factor))));
  }

  function update() {
    var src = lastEdited === 'a' ? valA : valB;
    var dst = lastEdited === 'a' ? valB : valA;
    var from = lastEdited === 'a' ? unitA.value : unitB.value;
    var to = lastEdited === 'a' ? unitB.value : unitA.value;
    var n = UC.parseNum(src.value);
    dst.value = isNaN(n) ? '' : UC.fmt(UC.convert(cat, from, to, n));
    renderFormula();
  }

  valA.addEventListener('input', function () { lastEdited = 'a'; update(); });
  valB.addEventListener('input', function () { lastEdited = 'b'; update(); });
  unitA.addEventListener('change', update);
  unitB.addEventListener('change', update);

  $('btn-swap').addEventListener('click', function () {
    var u = unitA.value;
    unitA.value = unitB.value;
    unitB.value = u;
    // keep the source value, recompute the other side
    update();
  });

  setCat('length', 'cm', 'in');
})();
</script>
